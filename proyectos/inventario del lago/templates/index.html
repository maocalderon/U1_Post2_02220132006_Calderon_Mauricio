<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario El Lago</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=12.0">
    <style>
        .reloj { font-size: 20px; color: #1e3a8a; font-weight: 700; background: #e0f2fe; padding: 5px 15px; border-radius: 8px; margin: 10px 0; display: inline-block; }
        .btn-logout { color: #ef4444; text-decoration: none; font-size: 13px; font-weight: 700; border: 1.5px solid #ef4444; padding: 6px 12px; border-radius: 8px; transition: 0.3s; display: inline-block; }
        .btn-logout:hover { background: #ef4444; color: white; }
    </style>
</head>
<body>
    <div class="contenedor">
        <header class="cabecera" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <div style="display: flex; align-items: center; gap: 20px;">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" style="width: 85px; height: 85px; border-radius: 50%; object-fit: cover;">
                <div>
                    <h1 style="margin: 0; color: #1e3a8a; font-size: 28px;">Inventario Barra</h1>
                    <p style="margin: 0; color: #64748b; text-transform: uppercase; letter-spacing: 1px; font-size: 13px;">Restaurante El Lago</p>
                </div>
            </div>

            <div style="text-align: right;">
                <span style="font-size: 16px;">¡{{ saludo }}, <b>{{ usuario_actual }}</b>! 👋</span><br>
                <div id="reloj" class="reloj">00:00:00</div><br>
                <a href="/logout" class="btn-logout">Cerrar Sesión</a>
            </div>
        </header>

        <div style="display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 18px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 25px;">
            <div>
                <label style="display: block; font-size: 11px; font-weight: 700; color: #64748b; margin-bottom: 5px; text-transform: uppercase;">Fecha del Registro</label>
                <input type="date" id="fecha" value="{{ fecha }}" onchange="buscarPorFecha()" 
                       style="padding: 10px; border-radius: 8px; border: 2px solid #cbd5e1; font-family: 'Inter', sans-serif; font-size: 16px; color: #1e293b; font-weight: 600; outline: none; cursor: pointer;">
            </div>
            <div style="display: flex; gap: 10px;">
                <a href="/reporte_ventas/semanal" class="btn-guardar" style="background: #475569; text-decoration: none; font-size: 14px;">📊 Semanal</a>
                <a href="/reporte_ventas/mensual" class="btn-guardar" style="background: #1e3a8a; text-decoration: none; font-size: 14px;">📅 Mensual</a>
            </div>
        </div>

        <form action="/actualizar" method="POST">
            <input type="hidden" name="fecha" value="{{ fecha }}">
            <div class="tabla-responsive">
                <table>
                    <thead>
                        <tr><th>PRODUCTO</th><th>HAY</th><th>INGRESO</th><th>VENTA</th><th>OBSEQUIO</th><th>PISCINA</th><th>QUEDÓ</th></tr>
                    </thead>
                    <tbody>
                        {% for p in productos %}
                        <tr>
                            <td class="col-producto">{{ p.nombre }}</td>
                            <td><input type="number" name="hay_{{ loop.index0 }}" value="{{ p.hay }}" oninput="calc(this)"></td>
                            <td><input type="number" name="ingreso_{{ loop.index0 }}" value="{{ p.ingreso }}" oninput="calc(this)"></td>
                            <td><input type="number" name="venta_{{ loop.index0 }}" value="{{ p.venta }}" oninput="calc(this)"></td>
                            <td><input type="number" name="obsequio_{{ loop.index0 }}" value="{{ p.obsequio }}" oninput="calc(this)"></td>
                            <td><input type="number" name="piscina_{{ loop.index0 }}" value="{{ p.piscina }}" oninput="calc(this)"></td>
                            <td class="resaltado">{{ p.quedo }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
            
            <div class="acciones" style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 25px;">
                <button type="button" onclick="limpiar()" style="background: #64748b;" class="btn-guardar">🧹 Limpiar</button>
                <button type="submit" name="accion" value="editar" style="background: #d97706;" class="btn-guardar">✏️ Editar Registro</button>
                <button type="submit" name="accion" value="guardar" style="background: #166534; min-width: 180px;" class="btn-guardar">💾 Guardar Nuevo</button>
            </div>
        </form>
    </div>

    <script>
        function actualizarReloj() {
            const ahora = new Date();
            const tiempo = ahora.toLocaleTimeString('es-CO');
            document.getElementById('reloj').innerText = tiempo;
        }
        setInterval(actualizarReloj, 1000);
        actualizarReloj();

        function buscarPorFecha() { window.location.href = "/?fecha=" + document.getElementById('fecha').value; }
        
        function limpiar() {
            if(confirm("¿Deseas poner todos los valores en cero?")) {
                document.querySelectorAll('input[type="number"]').forEach(i => i.value = 0);
                document.querySelectorAll('.resaltado').forEach(t => t.innerText = 0);
            }
        }

        function calc(el) {
            let f = el.closest('tr');
            let i = f.querySelectorAll('input[type="number"]');
            let res = parseInt(i[0].value||0) + parseInt(i[1].value||0) - parseInt(i[2].value||0) - parseInt(i[3].value||0) + parseInt(i[4].value||0);
            f.querySelector('.resaltado').innerText = res;
        }
    </script>
</body>
</html>
