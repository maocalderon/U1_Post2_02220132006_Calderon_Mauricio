<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Restaurante El Lago</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #1e3a8a;
            --primary-hover: #1d4ed8;
            --bg-soft: #f1f5f9;
            --white: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-soft);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Contenedor principal de la tarjeta */
        .card-login {
            background-color: var(--white);
            padding: 45px 35px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        /* Estilo del logo circular */
        .logo-circular {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(30, 58, 138, 0.2);
            border: 3px solid var(--white);
        }

        h1 {
            color: var(--primary-blue);
            font-size: 26px;
            margin: 0 0 10px 0;
            font-weight: 700;
        }

        p.bienvenida {
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 30px;
        }

        /* Diseño de los campos de entrada */
        .form-group {
            text-align: left;
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dark);
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.1);
        }

        /* Botón profesional */
        .btn-entrar {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-entrar:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(30, 58, 138, 0.3);
        }

        /* Mensaje de error en rojo */
        .mensaje-error {
            background-color: #fef2f2;
            color: #991b1b;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            border: 1px solid #fee2e2;
            font-weight: 500;
        }

        footer {
            margin-top: 30px;
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="card-login">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo El Lago" class="logo-circular">
        
        <h1>¡Bienvenido!</h1>
        <p class="bienvenida">Sistema de Inventario Barra Principal</p>

        {% if error %}
        <div class="mensaje-error">
            ❌ {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="form-group">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" name="usuario" required placeholder="Nombre de usuario">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-entrar">Iniciar Sesión</button>
        </form>

        <footer>
            Restaurante El Lago &copy; 2026 <br>
            Cúcuta, Norte de Santander
        </footer>
    </div>

</body>
</html>
